<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UCE-brain Phase 2 — transformer only</title>
<style>
  body { font-family: monospace; max-width: 900px; margin: 2em auto; padding: 0 1em; }
  h2 { margin-bottom: 0.2em; }
  .subtitle { color: #666; margin-top: 0; }
  #log { white-space: pre-wrap; background: #111; color: #0f0; padding: 1em; height: 560px; overflow-y: auto; border-radius: 4px; }
  select, button { font-size: 1em; margin: 0.5em 0; padding: 0.3em 0.8em; }
  .row { display: flex; gap: 1em; align-items: center; margin-bottom: 0.5em; }
</style>
</head>
<body>
<h2>UCE-brain — Phase 2</h2>
<p class="subtitle">Browser runs the transformer only. Src embeddings + attention mask come from the Python reference pipeline. Expect cos &gt; 0.999 vs <code>ref_cell_embedding.bin</code>.</p>
<div class="row">
  <label>Backend:
    <select id="backend">
      <option value="webgpu">WebGPU</option>
      <option value="wasm">WASM (CPU)</option>
    </select>
  </label>
  <button id="run">Run</button>
</div>
<div id="log"></div>
<script type="module" src="dist/phase2.js"></script>
</body>
</html>

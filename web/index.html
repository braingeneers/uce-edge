<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UCE-brain ONNX Web Spike</title>
<style>
  body { font-family: monospace; max-width: 800px; margin: 2em auto; }
  #log { white-space: pre-wrap; background: #111; color: #0f0; padding: 1em; height: 500px; overflow-y: auto; }
  select, button { font-size: 1em; margin: 0.5em 0; padding: 0.3em 0.8em; }
  .row { display: flex; gap: 1em; align-items: center; }
</style>
</head>
<body>
<h2>UCE-brain 8L — ONNX Runtime Web</h2>
<div class="row">
  <label>Model:
    <select id="model">
      <option value="brain_8l_int8.onnx">INT8 (33 MB)</option>
      <option value="brain_8l_fp32.onnx">FP32 (112 MB)</option>
    </select>
  </label>
  <label>Backend:
    <select id="backend">
      <option value="webgpu">WebGPU</option>
      <option value="wasm">WASM (CPU)</option>
    </select>
  </label>
  <button id="run" onclick="runInference()">Run Inference</button>
</div>
<div id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.all.min.js"></script>
<script>
const log = document.getElementById('log');
function print(msg) { log.textContent += msg + '\n'; log.scrollTop = log.scrollHeight; }

async function loadBinary(url) {
  print(`  fetching ${url}...`);
  const resp = await fetch(url);
  const buf = await resp.arrayBuffer();
  return new Float32Array(buf);
}

function cosine(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    na += a[i] * a[i];
    nb += b[i] * b[i];
  }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-12);
}

// Programmatic API for Playwright: runBenchmark(modelFile, backend) → result object
async function runBenchmark(modelFile, backend) {
  const [srcData, maskData, refCell] = await Promise.all([
    loadBinary('test_src.bin'),
    loadBinary('test_mask.bin'),
    loadBinary('test_ref_cell.bin'),
  ]);

  const seqLen = 128;
  const batchSize = 1;
  const embDim = 5120;

  const executionProviders = [{ name: backend }];
  const session = await ort.InferenceSession.create(modelFile, { executionProviders });

  const srcTensor = new ort.Tensor('float32', srcData, [batchSize, seqLen, embDim]);
  const maskTensor = new ort.Tensor('float32', maskData, [batchSize, seqLen]);

  // warmup
  for (let i = 0; i < 2; i++) {
    await session.run({ src: srcTensor, mask: maskTensor });
  }

  // timed
  const iters = 5;
  const t0 = performance.now();
  let result;
  for (let i = 0; i < iters; i++) {
    result = await session.run({ src: srcTensor, mask: maskTensor });
  }
  const elapsed = (performance.now() - t0) / iters;

  const cellEmb = result.cell_embedding.data;
  const cellMaxDiff = Math.max(...Array.from(cellEmb).map((v, i) => Math.abs(v - refCell[i])));
  const cos = cosine(cellEmb, refCell);

  return {
    model: modelFile,
    backend: backend,
    time_ms: Math.round(elapsed * 10) / 10,
    cell_maxdiff: cellMaxDiff,
    cosine: cos,
  };
}

// Interactive UI button handler
async function runInference() {
  const btn = document.getElementById('run');
  btn.disabled = true;
  log.textContent = '';

  const modelFile = document.getElementById('model').value;
  const backend = document.getElementById('backend').value;

  try {
    print(`loading fixtures...`);
    print(`running: ${modelFile} / ${backend}`);
    const r = await runBenchmark(modelFile, backend);
    print(`\n=== RESULTS ===`);
    print(`  model:        ${r.model}`);
    print(`  backend:      ${r.backend}`);
    print(`  time:         ${r.time_ms} ms / iter`);
    print(`  cell_maxdiff: ${r.cell_maxdiff.toExponential(2)}`);
    print(`  cosine:       ${r.cosine.toFixed(6)}`);
  } catch (e) {
    print(`\nERROR: ${e.message}`);
    print(e.stack);
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
